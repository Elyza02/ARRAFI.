<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Daftar Pesanan | Admin</title>

    <link rel="stylesheet"
        href="orders.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="phone">

    <!-- ================= HEADER ================= -->

    <header>

        <button id="backBtn">

            <i class="fa-solid fa-arrow-left"></i>

        </button>

        <h2>Daftar Pesanan</h2>

        <button id="refreshBtn">

            <i class="fa-solid fa-rotate"></i>

        </button>

    </header>

    <!-- ================= SEARCH ================= -->

    <section class="search-section">

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="searchInput"
                placeholder="Cari Invoice / Nama Pelanggan">

        </div>

    </section>

    <!-- ================= FILTER ================= -->

    <section class="filter-section">

        <button
            class="filter-btn active"
            data-status="Semua">

            Semua

        </button>

        <button
            class="filter-btn"
            data-status="Menunggu Verifikasi">

            Menunggu

        </button>

        <button
            class="filter-btn"
            data-status="Diproses">

            Diproses

        </button>

        <button
            class="filter-btn"
            data-status="Produksi">

            Produksi

        </button>

        <button
            class="filter-btn"
            data-status="Pengiriman">

            Kirim

        </button>

        <button
            class="filter-btn"
            data-status="Selesai">

            Selesai

        </button>

    </section>

    <!-- ================= DAFTAR PESANAN ================= -->

    <main
        class="order-list"
        id="orderList">

        <!-- Dibuat otomatis oleh daftar-pesanan.js -->

        <!-- Contoh Card -->

        <!--

        <div class="order-card">

            <div class="card-header">

                <div>

                    <h3>INV-240701001</h3>

                    <small>03 Juli 2026</small>

                </div>

                <span class="badge waiting">

                    Menunggu

                </span>

            </div>

            <div class="customer">

                <i class="fa-solid fa-user"></i>

                <span>Andi Saputra</span>

            </div>

            <div class="summary">

                <div>

                    <label>Total</label>

                    <h4>Rp 120.000</h4>

                </div>

                <div>

                    <label>Item</label>

                    <h4>3 Menu</h4>

                </div>

            </div>

            <button
                class="detail-btn">

                <i class="fa-solid fa-eye"></i>

                Lihat Detail

            </button>

        </div>

        -->

    </main>
        <!-- ================= MODAL DETAIL ================= -->

    <div
        class="modal"
        id="detailModal">

        <div class="modal-content">

            <div class="modal-header">

                <h3>Detail Pesanan</h3>

                <button id="closeModal">

                    <i class="fa-solid fa-xmark"></i>

                </button>

            </div>

            <div
                class="modal-body"
                id="modalBody">

                <!-- Dibuat oleh daftar-pesanan.js -->

            </div>

            <div class="modal-footer">

                <button
                    id="statusBtn"
                    class="primary-btn">

                    Verifikasi Pesanan

                </button>

            </div>

        </div>

    </div>

    <!-- ================= EMPTY ================= -->

    <div
        id="emptyState"
        class="empty-state"
        style="display:none;">

        <i class="fa-solid fa-box-open"></i>

        <h3>

            Belum Ada Pesanan

        </h3>

        <p>

            Data pesanan pelanggan akan muncul di sini.

        </p>

    </div>

    <!-- ================= LOADING ================= -->

    <div
        id="loading"
        class="loading"
        style="display:none;">

        <div class="loader"></div>

        <p>

            Memuat Data...

        </p>

    </div>

</div>

<script src="orders.js"></script>

</body>

</html>
