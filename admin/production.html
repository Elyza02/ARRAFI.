<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Produksi | Catering Arrafi</title>

    <link rel="stylesheet"
        href="production.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="phone">

    <!-- ================= HEADER ================= -->

    <header>

        <button id="backBtn">

            <i class="fa-solid fa-arrow-left"></i>

        </button>

        <h2>Produksi</h2>

        <button id="refreshBtn">

            <i class="fa-solid fa-rotate"></i>

        </button>

    </header>

    <!-- ================= SEARCH ================= -->

    <section class="search-section">

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="searchInput"
                placeholder="Cari Invoice / Nama Pelanggan">

        </div>

    </section>

    <!-- ================= INFO ================= -->

    <section class="info-card">

        <div class="info-icon">

            <i class="fa-solid fa-calendar-check"></i>

        </div>

        <div>

            <h3 id="productionCount">

                0

            </h3>

            <small>

                Pesanan Sedang Produksi

            </small>

        </div>

    </section>

    <!-- ================= LIST ================= -->

    <main
        class="production-list"
        id="productionList">

        <!-- Dibuat otomatis oleh production.js -->

        <!-- Contoh Card -->

        <!--

        <div class="production-card">

            <div class="production-header">

                <div>

                    <h3>INV-240701001</h3>

                    <small>03 Juli 2026</small>

                </div>

                <span class="status production">

                    Produksi

                </span>

            </div>

            <div class="customer">

                <i class="fa-solid fa-user"></i>

                <span>

                    Andi Saputra

                </span>

            </div>

            <div class="summary">

                <div>

                    <label>Total Menu</label>

                    <h4>5 Menu</h4>

                </div>

                <div>

                    <label>Total</label>

                    <h4>Rp120.000</h4>

                </div>

            </div>

            <button
                class="detail-btn">

                <i class="fa-solid fa-industry"></i>

                Lihat Produksi

            </button>

        </div>

        -->

    </main>
        <!-- ================= MODAL DETAIL ================= -->

    <div
        class="modal"
        id="productionModal">

        <div class="modal-content">

            <div class="modal-header">

                <h3>Detail Produksi</h3>

                <button id="closeModal">

                    <i class="fa-solid fa-xmark"></i>

                </button>

            </div>

            <div
                class="modal-body"
                id="modalBody">

                <!-- Dibuat otomatis oleh production.js -->

            </div>

            <!-- ================= JADWAL PRODUKSI ================= -->

            <div class="production-form">

                <label>

                    Jadwal Produksi

                </label>

                <input
                    type="date"
                    id="productionDate">

                <label>

                    Jam Produksi

                </label>

                <input
                    type="time"
                    id="productionTime">

            </div>

            <!-- ================= CATATAN DAPUR ================= -->

            <div class="production-note">

                <label>

                    Catatan Dapur

                </label>

                <textarea
                    id="productionNote"
                    readonly>

                </textarea>

            </div>

            <div class="modal-footer">

                <button
                    id="deliveryBtn"
                    class="delivery-btn">

                    <i class="fa-solid fa-truck-fast"></i>

                    Kirim ke Pengiriman

                </button>

            </div>

        </div>

    </div>

    <!-- ================= EMPTY ================= -->

    <div
        class="empty-state"
        id="emptyState"
        style="display:none;">

        <i class="fa-solid fa-industry"></i>

        <h3>

            Tidak Ada Produksi

        </h3>

        <p>

            Belum ada pesanan yang masuk ke proses produksi.

        </p>

    </div>

    <!-- ================= LOADING ================= -->

    <div
        class="loading"
        id="loading"
        style="display:none;">

        <div class="loader"></div>

        <p>

            Memuat Data...

        </p>

    </div>

</div>

<script src="production.js"></script>

</body>

</html>
