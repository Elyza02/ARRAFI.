<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Verifikasi Pembayaran | Catering Arrafi</title>

    <link rel="stylesheet"
        href="verification.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="phone">

    <!-- ================= HEADER ================= -->

    <header>

        <button id="backBtn">

            <i class="fa-solid fa-arrow-left"></i>

        </button>

        <h2>Verifikasi Pembayaran</h2>

        <button id="refreshBtn">

            <i class="fa-solid fa-rotate"></i>

        </button>

    </header>

    <!-- ================= SEARCH ================= -->

    <section class="search-section">

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="searchInput"
                placeholder="Cari Invoice / Nama Pelanggan">

        </div>

    </section>

    <!-- ================= INFO ================= -->

    <section class="info-card">

        <div class="info-icon">

            <i class="fa-solid fa-money-check-dollar"></i>

        </div>

        <div>

            <h3 id="waitingCount">

                0

            </h3>

            <small>

                Pembayaran Menunggu Verifikasi

            </small>

        </div>

    </section>

    <!-- ================= LIST ================= -->

    <main
        class="payment-list"
        id="paymentList">

        <!-- Dibuat otomatis oleh verification.js -->

        <!-- Contoh Card -->

        <!--

        <div class="payment-card">

            <div class="payment-header">

                <div>

                    <h3>INV-240701001</h3>

                    <small>03 Juli 2026</small>

                </div>

                <span class="status waiting">

                    Menunggu

                </span>

            </div>

            <div class="customer">

                <i class="fa-solid fa-user"></i>

                <span>

                    Andi Saputra

                </span>

            </div>

            <div class="payment-summary">

                <div>

                    <label>Total</label>

                    <h4>Rp120.000</h4>

                </div>

                <div>

                    <label>Metode</label>

                    <h4>Transfer</h4>

                </div>

            </div>

            <button
                class="detail-btn">

                <i class="fa-solid fa-eye"></i>

                Lihat Bukti

            </button>

        </div>

        -->

    </main>
        <!-- ================= MODAL DETAIL ================= -->

    <div
        class="modal"
        id="paymentModal">

        <div class="modal-content">

            <div class="modal-header">

                <h3>Detail Pembayaran</h3>

                <button id="closeModal">

                    <i class="fa-solid fa-xmark"></i>

                </button>

            </div>

            <div
                class="modal-body"
                id="modalBody">

                <!-- Dibuat otomatis oleh verification.js -->

            </div>

            <div class="modal-footer">

                <button
                    id="rejectBtn"
                    class="reject-btn">

                    <i class="fa-solid fa-xmark"></i>

                    Tolak Pembayaran

                </button>

                <button
                    id="acceptBtn"
                    class="accept-btn">

                    <i class="fa-solid fa-check"></i>

                    Terima Pembayaran

                </button>

            </div>

        </div>

    </div>

    <!-- ================= EMPTY ================= -->

    <div
        id="emptyState"
        class="empty-state"
        style="display:none;">

        <i class="fa-solid fa-receipt"></i>

        <h3>

            Tidak Ada Pembayaran

        </h3>

        <p>

            Semua pembayaran telah diverifikasi.

        </p>

    </div>

    <!-- ================= LOADING ================= -->

    <div
        id="loading"
        class="loading"
        style="display:none;">

        <div class="loader"></div>

        <p>

            Memuat Data...

        </p>

    </div>

</div>

<script src="verification.js"></script>

</body>

</html>
