<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Keranjang | Catering Arrafi</title>

    <link rel="stylesheet"
        href="cart.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="phone">

    <!-- HEADER -->

    <header>

        <button
            class="back-btn"
            onclick="history.back()">

            <i class="fa-solid fa-arrow-left"></i>

        </button>

        <h2>Keranjang</h2>

        <button
            id="clearCart">

            <i class="fa-solid fa-trash"></i>

        </button>

    </header>

    <!-- LIST PRODUK -->

    <main
        class="cart-container"
        id="cartContainer">

        <!-- Dibuat otomatis oleh cart.js -->

    </main>

    <!-- RINGKASAN -->

    <section class="summary">

        <div class="summary-item">

            <span>Subtotal</span>

            <span id="subtotal">

                Rp 0

            </span>

        </div>

        <div class="summary-item">

            <span>Ongkir</span>

            <span id="shipping">

                Rp 10.000

            </span>

        </div>

        <div class="summary-item">

            <span>Diskon</span>

            <span id="discount">

                Rp 0

            </span>

        </div>

        <div class="summary-item total">

            <span>Total</span>

            <span id="grandTotal">

                Rp 0

            </span>

        </div>

    </section>

    <!-- FOOTER -->

    <footer>

        <button
            id="checkoutBtn">

            <i class="fa-solid fa-credit-card"></i>

            Lanjut Pembayaran

        </button>

    </footer>

</div>

<!-- POPUP HAPUS -->

<div
    class="modal"
    id="deleteModal">

    <div class="modal-box">

        <i class="fa-solid fa-circle-question"></i>

        <h3>

            Hapus Semua Produk?

        </h3>

        <p>

            Semua produk di keranjang akan dihapus.

        </p>

        <div class="modal-button">

            <button id="cancelDelete">

                Batal

            </button>

            <button id="confirmDelete">

                Hapus

            </button>

        </div>

    </div>

</div>

<script src="cart.js"></script>

</body>

</html>
