<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Home | Catering Arrafi</title>

    <link rel="stylesheet"
        href="home.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="phone">

    <!-- ================= HEADER ================= -->

    <header>

        <div class="header-left">

            <p>Selamat Datang</p>

            <h3 id="userName">

                Pelanggan

            </h3>

        </div>

        <div class="header-right">

            <img
                src="user.png"
                id="userPhoto"
                   onerror="this.style.display='none'">
        </div>

    </header>

    <!-- ================= SEARCH ================= -->

    <div class="search-box">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
            type="text"
            id="searchInput"
            placeholder="Cari menu catering...">

    </div>

    <!-- ================= BANNER ================= -->

    <section class="banner">

        <div class="banner-content">

            <h2>

                Catering Arrafi

            </h2>

            <p>

                Menu Sehat • Higienis • Lezat

            </p>

            <button id="orderNow">

                Pesan Sekarang

            </button>

        </div>

        <img
            src="cat.png"
            alt="cat">

    </section>

    <!-- ================= CATEGORY ================= -->

    <section class="category">

        <h3>Kategori</h3>

        <div class="category-list">

            <button class="category-btn active"
                data-category="Semua">

                Semua

            </button>

            <button class="category-btn"
                data-category="Breakfast">

                Breakfast

            </button>

            <button class="category-btn"
                data-category="Lunch">

                Lunch

            </button>

        

            </button>

            <button class="category-btn"
                data-category="Snack">

                Snack

            </button>

             

            </button>

        </div>

    </section>

    <!-- ================= MENU ================= -->

    <section class="menu-section">

        <div class="title-row">

            <h3>Menu Favorit</h3>

            <a href="#">

                Lihat Semua

            </a>

        </div>

        <div
            class="menu-grid"
            id="menuGrid">

            <!-- Dibuat otomatis oleh home.js -->

        </div>

    </section>

    <!-- ================= BOTTOM NAVIGATION ================= -->

    <nav class="bottom-nav">

        <a
            href="home.html"
            class="active">

            <i class="fa-solid fa-house"></i>

            <span>Home</span>

        </a>

        <a
            href="cart.html">

            <i class="fa-solid fa-cart-shopping"></i>

            <span>Keranjang</span>

            <small id="cartBadge">

                0

            </small>

        </a>

        <a
            href="history.html">

            <i class="fa-solid fa-receipt"></i>

            <span>Riwayat</span>

        </a>

        <a
            href="profile.html">

            <i class="fa-solid fa-user"></i>

            <span>Profil</span>

        </a>

    </nav>

</div>

<script src="home.js"></script>

</body>

</html>
