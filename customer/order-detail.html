 <!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Detail Pesanan | Catering Arrafi</title>

    <link rel="stylesheet"
        href="order-detail.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="phone">

    <!-- HEADER -->

    <header>

        <button
            onclick="history.back()">

            <i class="fa-solid fa-arrow-left"></i>

        </button>

        <h2>Detail Pesanan</h2>

        <div></div>

    </header>

    <!-- CONTENT -->

    <main class="detail-content">

        <!-- INFORMASI PESANAN -->

        <div class="card">

            <h3>Informasi Pesanan</h3>

            <div class="info-row">

                <span>Invoice</span>

                <b id="invoice">-</b>

            </div>

            <div class="info-row">

                <span>Tanggal</span>

                <b id="tanggal">-</b>

            </div>

            <div class="info-row">

                <span>Status</span>

                <span
                    class="status"
                    id="status">

                    -

                </span>

            </div>

        </div>

        <!-- PELANGGAN -->

        <div class="card">

            <h3>Data Pelanggan</h3>

            <div class="info-row">

                <span>Nama</span>

                <b id="nama">-</b>

            </div>

            <div class="info-row">

                <span>Email</span>

                <b id="email">-</b>

            </div>

        </div>

        <!-- PRODUK -->

        <div class="card">

            <h3>Daftar Menu</h3>

            <div
                id="productList">

            </div>

        </div>

        <!-- PEMBAYARAN -->

        <div class="card">

            <h3>Pembayaran</h3>

            <div class="info-row">

                <span>Metode</span>

                <b id="metode">

                    -

                </b>

            </div>

            <div class="info-row">

                <span>Subtotal</span>

                <b id="subtotal">

                    Rp0

                </b>

            </div>

            <div class="info-row">

                <span>Ongkir</span>

                <b id="ongkir">

                    Rp0

                </b>

            </div>

            <div class="info-row">

                <span>Diskon</span>

                <b id="diskon">

                    Rp0

                </b>

            </div>

            <hr>

            <div class="info-row total">

                <span>Total</span>

                <h2 id="total">

                    Rp0

                </h2>

            </div>

        </div>

        <!-- BUKTI -->

        <div class="card">

            <h3>Bukti Pembayaran</h3>

            <img
                id="proofImage"
                class="proof-image">

        </div>

        <!-- CATATAN -->

        <div class="card">

            <h3>Catatan</h3>

            <p id="catatan">

                -

            </p>

        </div>

    </main>

    <!-- FOOTER -->

    <footer>

        <button
            id="backHome">

            <i class="fa-solid fa-house"></i>

            Kembali ke Beranda

        </button>

    </footer>

</div>

<script src="order-detail.js"></script>

</body>

</html>
