<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Profil | Catering Arrafi</title>

    <link rel="stylesheet"
        href="profile.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="phone">

    <!-- HEADER -->

    <header>

        <button
            onclick="history.back()">

            <i class="fa-solid fa-arrow-left"></i>

        </button>

        <h2>Profil Saya</h2>

        <button id="editProfile">

            <i class="fa-solid fa-pen"></i>

        </button>

    </header>

    <!-- CONTENT -->

    <main class="profile-content">

        <!-- PROFILE -->

        <section class="profile-card">

            <img
                id="profileImage"
                src="../assets/profile.png"
                alt="Profile">

            <h2 id="userName">

                Nama Pengguna

            </h2>

            <p id="userEmail">

                email@gmail.com

            </p>

        </section>

        <!-- INFORMASI -->

        <section class="card">

            <h3>Informasi Akun</h3>

            <div class="item">

                <i class="fa-solid fa-user"></i>

                <div>

                    <label>Nama</label>

                    <span id="nama">

                        -

                    </span>

                </div>

            </div>

            <div class="item">

                <i class="fa-solid fa-envelope"></i>

                <div>

                    <label>Email</label>

                    <span id="email">

                        -

                    </span>

                </div>

            </div>

            <div class="item">

                <i class="fa-solid fa-phone"></i>

                <div>

                    <label>No. HP</label>

                    <span id="phone">

                        -

                    </span>

                </div>

            </div>

            <div class="item">

                <i class="fa-solid fa-location-dot"></i>

                <div>

                    <label>Alamat</label>

                    <span id="address">

                        -

                    </span>

                </div>

            </div>

        </section>

        <!-- MENU -->

        <section class="card">

            <h3>Menu</h3>

            <button class="menu-btn" id="historyBtn">

                <i class="fa-solid fa-clock-rotate-left"></i>

                Riwayat Pesanan

                <i class="fa-solid fa-chevron-right"></i>

            </button>

            <button class="menu-btn" id="passwordBtn">

                <i class="fa-solid fa-lock"></i>

                Ubah Password

                <i class="fa-solid fa-chevron-right"></i>

            </button>

            <button class="menu-btn" id="aboutBtn">

                <i class="fa-solid fa-circle-info"></i>

                Tentang Aplikasi

                <i class="fa-solid fa-chevron-right"></i>

            </button>

            <button class="menu-btn" id="helpBtn">

                <i class="fa-solid fa-headset"></i>

                Bantuan

                <i class="fa-solid fa-chevron-right"></i>

            </button>

        </section>

        <!-- PENGATURAN -->

        <section class="card">

            <h3>Pengaturan</h3>

            <div class="switch-item">

                <span>

                    Notifikasi

                </span>

                <label class="switch">

                    <input
                        type="checkbox"
                        id="notification">

                    <span class="slider"></span>

                </label>

            </div>

            <div class="switch-item">

                <span>

                    Mode Gelap

                </span>

                <label class="switch">

                    <input
                        type="checkbox"
                        id="darkMode">

                    <span class="slider"></span>

                </label>

            </div>

        </section>

    </main>

    <!-- FOOTER -->

    <footer>

        <button
            id="logoutBtn">

            <i class="fa-solid fa-right-from-bracket"></i>

            Keluar

        </button>

    </footer>

</div>

<!-- MODAL LOGOUT -->

<div
    class="modal"
    id="logoutModal">

    <div class="modal-box">

        <i class="fa-solid fa-circle-question"></i>

        <h3>

            Keluar dari akun?

        </h3>

        <p>

            Anda harus login kembali untuk menggunakan aplikasi.

        </p>

        <div class="modal-button">

            <button
                id="cancelLogout">

                Batal

            </button>

            <button
                id="confirmLogout">

                Keluar

            </button>

        </div>

    </div>

</div>

<script src="profile.js"></script>

</body>

</html>
