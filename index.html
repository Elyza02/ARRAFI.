<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login | Catering Arrafi</title>

    <link rel="stylesheet"
        href="login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="phone">

    <!-- ================= HEADER ================= -->

    <div class="top-area">

        <div class="logo-box">

            <img
                src="logo.png"
                 
                id="logo">

        </div>

        <h2>Catering Arrafi</h2>

        <p>Selamat Datang Kembali</p>

    </div>

    <!-- ================= FORM LOGIN ================= -->

    <form id="loginForm">

        <div class="input-group">

            <label>Email</label>

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Masukkan Email"
                    required>

            </div>

        </div>

        <div class="input-group">

            <label>Password</label>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Masukkan Password"
                    required>

                <span
                    class="togglePassword"
                    id="togglePassword">

                    <i class="fa-solid fa-eye"></i>

                </span>

            </div>

        </div>

        <div class="remember">

            <label>

                <input
                    type="checkbox"
                    id="remember">

                Ingat Saya

            </label>

            <a href="#">

                Lupa Password?

            </a>

        </div>

        <button
            type="submit"
            class="login-btn">

            Login

        </button>

    </form>

    <!-- ================= FOOTER ================= -->

    <div class="bottom-text">

        Belum punya akun?

        <a href="register.html">

            Daftar

        </a>

    </div>

</div>

<script src="login.js"></script>

</body>

</html>
